name: Napi BTC Treasury frissítés

on:
  schedule:
    # Minden nap reggel 8:00 UTC (9:00 CET)
    - cron: '0 8 * * *'
  workflow_dispatch: # Kézi indítás is lehetséges a GitHub felületről

jobs:
  update-btc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Függőségek telepítése
        run: pip install requests beautifulsoup4

      - name: BTC Treasury frissítés
        run: python update_btc_treasury.py

      - name: Változások commitolása és pusholása
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "BTC treasury frissítés: $(date +%Y-%m-%d)"
          git push
