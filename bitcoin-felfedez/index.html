<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Bitcoin nem találmány — hanem felfedezés</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0D1117;
            color: #E6EDF3;
            overflow: hidden;
            height: 100vh;
        }

        .presentation {
            width: 100%;
            height: 100vh;            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .progress-bar {
            height: 4px;
            background: #30363D;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #F7931A 0%, #FF6B35 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .slide-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;            align-items: center;
            justify-content: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            text-align: center;
        }

        .slide.active {
            opacity: 1;
            z-index: 10;
        }

        .slide.prev {
            opacity: 0;            z-index: 5;
        }

        /* Hero Slide */
        .slide.hero {
            background: linear-gradient(135deg, #0D1117 0%, #161B22 50%, #0D1117 100%);
            justify-content: space-around;
        }

        .hero-badge {
            font-size: 14px;
            font-weight: 600;
            color: #F7931A;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .hero-title {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #F7931A 0%, #FF6B35 50%, #F7931A 100%);
            -webkit-background-clip: text;            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.1); }
        }

        .hero-subtitle {
            font-size: 24px;
            font-weight: 300;
            line-height: 1.6;
            color: #C9D1D9;
            margin-bottom: 40px;
            max-width: 900px;
        }

        .hero-quote {
            font-size: 16px;
            font-weight: 400;
            color: #8B949E;
            font-style: italic;
            border-left: 3px solid #F7931A;            padding-left: 20px;
            max-width: 700px;
        }

        /* Divider Slide */
        .slide.divider {
            background: linear-gradient(135deg, #161B22 0%, #0D1117 100%);
            justify-content: center;
        }

        .divider-number {
            font-size: 120px;
            font-weight: 800;
            color: #F7931A;
            line-height: 1;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .divider-title {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #E6EDF3;
        }
        .divider-subtitle {
            font-size: 20px;
            font-weight: 300;
            color: #8B949E;
            max-width: 800px;
            line-height: 1.6;
        }

        /* Person Intro Slide */
        .slide.person-intro {
            background: linear-gradient(135deg, #0D1117 0%, #161B22 50%, #0D1117 100%);
            justify-content: center;
        }

        .person-portrait {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            margin-bottom: 30px;
            border: 4px solid #F7931A;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;            font-weight: 700;
            color: white;
            background-size: cover;
            background-position: center;
            position: relative;
            box-shadow: 0 0 30px rgba(247, 147, 26, 0.3);
        }

        .person-name {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #E6EDF3;
        }

        .person-years {
            font-size: 18px;
            color: #8B949E;
            margin-bottom: 5px;
        }

        .person-role {
            font-size: 14px;
            color: #F7931A;
            font-weight: 600;            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .person-icon {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .btc-connection-box {
            border: 2px solid #F7931A;
            border-radius: 8px;
            padding: 20px;
            max-width: 600px;
            font-size: 16px;
            line-height: 1.6;
            color: #C9D1D9;
            background: rgba(247, 147, 26, 0.05);
        }

        /* Bio Slide */
        .slide.bio {
            background: #0D1117;
            justify-content: flex-start;            overflow-y: auto;
            padding-top: 40px;
        }

        .bio-header {
            position: relative;
            width: 100%;
            height: 400px;
            margin-bottom: 50px;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            background-size: cover;
            background-position: center;
        }

        .bio-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;            background: linear-gradient(180deg, transparent 0%, rgba(13, 17, 23, 0.7) 70%, #0D1117 100%);
            z-index: 1;
        }

        .bio-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
            color: #E6EDF3;
        }

        .bio-content {
            max-width: 900px;
            padding: 0 40px 40px 40px;
        }

        .bio-text {
            font-size: 16px;
            line-height: 1.8;
            color: #C9D1D9;
            margin-bottom: 20px;
            text-align: left;
        }
        /* BTC Connection Slide */
        .slide.btc-connection {
            background: linear-gradient(135deg, #0D1117 0%, #1A1F26 100%);
            justify-content: center;
        }

        .btc-connection-content {
            max-width: 800px;
            border: 3px solid #F7931A;
            border-radius: 12px;
            padding: 60px;
            background: rgba(247, 147, 26, 0.05);
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(247, 147, 26, 0.2);
            }
            50% {
                box-shadow: 0 0 40px rgba(247, 147, 26, 0.4);
            }
        }
        .btc-icon-large {
            font-size: 80px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .btc-connection-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #F7931A;
        }

        .btc-connection-text {
            font-size: 18px;
            line-height: 1.8;
            color: #C9D1D9;
        }
        /* Closing Slide */
        .slide.closing {
            background: linear-gradient(135deg, #0D1117 0%, #161B22 50%, #0D1117 100%);
            justify-content: center;
        }

        .closing-quote {
            font-size: 42px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 80px;
            color: #E6EDF3;
            max-width: 900px;
        }

        .closing-boxes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1000px;
        }

        .closing-box {
            border: 2px solid #F7931A;            border-radius: 8px;
            padding: 40px;
            background: rgba(247, 147, 26, 0.05);
            text-align: center;
        }

        .closing-box-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .closing-box-text {
            font-size: 16px;
            line-height: 1.6;
            color: #C9D1D9;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(13, 17, 23, 0.95);
            border-top: 1px solid #30363D;        }

        .control-btn {
            background: none;
            border: 2px solid #F7931A;
            color: #F7931A;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .control-btn:hover {
            background: #F7931A;
            color: #0D1117;
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .slide-counter {
            font-size: 16px;
            font-weight: 600;
            color: #8B949E;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .slide {
                padding: 40px;
            }

            .hero-title {
                font-size: 48px;
            }

            .hero-subtitle {
                font-size: 18px;
            }

            .divider-number {
                font-size: 80px;
            }
            .divider-title {
                font-size: 40px;
            }

            .person-name {
                font-size: 36px;
            }

            .bio-header {
                height: 200px;
            }

            .bio-title {
                font-size: 24px;
            }

            .bio-text {
                font-size: 14px;
            }

            .closing-boxes {
                grid-template-columns: 1fr;
            }
            .controls {
                padding: 15px 40px;
            }
        }

        @media (max-width: 768px) {
            .slide {
                padding: 20px;
            }

            .hero-title {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 16px;
            }

            .divider-title {
                font-size: 32px;
            }

            .person-name {
                font-size: 28px;            }

            .bio-title {
                font-size: 20px;
            }

            .controls {
                padding: 10px 20px;
                font-size: 12px;
            }

            .control-btn {
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="presentation">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="slide-container" id="slideContainer"></div>
        <div class="controls">
            <button class="control-btn" id="prevBtn" onclick="previousSlide()">← Előző</button>
            <span class="slide-counter"><span id="currentSlide">1</span> / <span id="totalSlides">71</span></span>
            <button class="control-btn" id="nextBtn" onclick="nextSlide()">Következő →</button>
        </div>
    </div>

    <script>
        const slides = [
            {type:'hero',badge:'₿ PREZENTÁCIÓ',title:'A Bitcoin nem találmány — hanem felfedezés',subtitle:'Egy gondolat, amely évtizedeken keresztül várt arra, hogy valaki megtalálja. Az út Teslától Satoshiig.',quote:'"Minden nagy igazságot először blaszfémiának tartottak." — George Bernard Shaw'},
            {type:'divider',number:'I',title:'A látnokok',subtitle:'Azok, akik először látták: a pénz jelenlegi formája törékenyen emberi — és hogy lehetne másként is.'},
            {type:'person-intro',name:'Nikola Tesla',years:'1856–1943',role:'Feltaláló · Villamosmérnök · Jövőlátó',icon:'⚡',initials:'NT',color:'linear-gradient(135deg, #FF6B35 0%, #F7931A 100%)',photoUrl:'images/tesla_portrait.jpg',btcConnection:'A proof-of-work az energiafelhasználást teszi a pénzteremtés alapjává — Tesla energia-víziója.'},
            {type:'bio',bgImage:'images/tesla_1.png',title:'A váltóáram forradalma',content:['Tesla az ipari civilizáció legfontosabb energetikai forradalmaként hagyta ránk a váltóáramú elektromos rendszert. Az 1890-es évekre Westinghouse-zal együttműködve bebizonyította, hogy az energia hatékonyan szállítható nagy távolságokon — valami, amit Edison egyenáramú rendszere soha nem tudott volna megvalósítani.','A váltóáram elve maga is egy gondolat a decentralizáció felé: az energia több pontról terjeszthető, nem szükséges egyetlen központi erőmű az egész civilizációt ellátni.']},
            {type:'bio',bgImage:'images/tesla_2.png',title:'300+ szabadalom',content:['Élete során több mint 300 szabadalmat jegyeztek be a nevére különböző országokban, beleértve a rádióátvitel, az induktív motor, a transzformátor és a nagyfeszültségű rendszerek alapvető szabadalmait. A találmányok mögött mindig ugyanaz az elvont gondolkodásmód állt: a világ energiában és frekvenciában írható le.','Tesla soha nem volt üzletember. Az ő világa tiszta fizika és matematika volt — és ebből következően mindig szegényen halt meg.']},
            {type:'bio',bgImage:'images/tesla_3.png',title:'Wardenclyffe: a szabad energia álma',content:['Tesla legambiciózusabb álma a Wardenclyffe-torony volt (1901–1917): egy globális, vezeték nélküli energiaátviteli hálózat, amely ingyenesen vagy szinte ingyenesen juttatott volna elektromos energiát a Föld bármely pontjára. Szabadalmaztatta a technológiát, sőt — kísérleteket végzett.','J.P. Morgan visszavonta a finanszírozást, mert egy ingyenes hálózaton nem lehet díjat szedni. A centralizált pénzügyi rendszer szempontjából Tesla vízióját meg kellett akadályozni. Ezért maradt fragmentáris — és ezért halt meg szegényen.']},
            {type:'bio',bgImage:'images/tesla_4.png',title:'Energia mint értékmérő',content:['Ami kevéssé ismert: Tesla töredékesen, de következetesen foglalkozott az energia mint értékmérő gondolatával. Úgy vélte, hogy az aranyalapú pénzrendszer elavult, és hogy az emberiség energiafelhasználása sokkal igazabb alapja lehetne egy értékrendszernek.','Tesla tragikusan szegényen halt meg New Yorkban, miközben szabadalmainak árnyéka megvilágítja a 21. századi technológia nagy részét. De az ő energia-víziója valahogy továbbélő — a Bitcoin-bányászat éppen ezt teszi: az energiafelhasználást teszi a pénzteremtés alapjává.']},
            {type:'btc-connection',title:'Tesla és a Bitcoin',text:'Tesla globális, nyílt energiahálózat-víziója és az energia mint értékmérő gondolata közvetlenül előrevetíti a Bitcoin alaplogikáját: a proof-of-work éppen az energiafelhasználást — a valódi fizikai munkát — teszi a pénzteremtés alapjává. A Wardenclyffe-torony és a blokklánc ugyanazt a kérdést teszi fel: ki kontrollálhatja a hálózatot? Válasz: senki. Az összes csomópont együtt.'},
            {type:'person-intro',name:'Henry Ford',years:'1863–1947',role:'Iparos · Autógyáros · Pénzkritikus',icon:'🚗',initials:'HF',color:'linear-gradient(135deg, #4A90E2 0%, #357ABD 100%)',photoUrl:'images/ford_portrait.jpg',btcConnection:'Ford 1921-ben azt kérte, amit Satoshi 2008-ban megépített: munkaalapú pénzt.'},
            {type:'bio',bgImage:'images/ford_1.png',title:'A futószalag forradalma',content:['Henry Ford neve a tömegtermelés szinonimájává vált — de a Model T és a futószalag csak a felszín. Ford a 20. század elejének legfontosabb ipari forradalmát hajtotta végre: bebizonyította, hogy a hatékonyság és a munkásjólét nem zárják ki egymást, sőt egymást feltételezik.','A futószalag nem csupán egy termelési módszer volt — ez egy filozófia: az egész komplex rendszer apró, ismétlődő lépésekre lebontva, amely már-már alkalmas volt gépi végrehajtásra. De Ford tudta: a végén emberi kézekre lesz szükség.']},
            {type:'bio',bgImage:'images/ford_2.png',title:'Napi 5 dollár',content:['1914-ben Ford bevezette a napi 5 dolláros minimálbért — kétszeresét az akkori piaci átlagnak — és a napi 8 órás munkanapot. Az indok részben üzleti volt: csökkenteni a fluktuációt, magasabb termelékenységet elérni. De ez egyszersmind politikai állásfoglalás is volt: a tőke és a munka érdeke nem szükségszerűen ellentétes.','A munkások, akik Model T-ket gyártottak, most meg is tudták maguknak vásárolni azokat. Ford úgy gondolt rá: ha a munkások szegények, kik vásárolják meg az autókat?']},
            {type:'bio',bgImage:'images/ford_3.png',title:'A bankrendszer kritikája',content:['Ford bankrendszer-kritikája erős és következetes volt egész életén át. Nyilvánosan kijelentette, hogy „ha az emberek megértenék, hogyan működik a bankrendszer, forradalomra kerülne sor holnap reggel." A kamatos kamatot és a hitelpénz-teremtést az igazságtalan gazdagodás eszközének tartotta.','„Az egyetlen dolog, amit a bankokról tudni kell: hogy egyértelműen rossz az egész rendszer," — így szólt egyszer Ford. A bankok, a monopol pénzteremtés, a mesterséges szűkösség — mindez összeesküvésnek tűnt számára a munkások ellen.']},
            {type:'bio',bgImage:'images/ford_4.png',title:'Energia-valuta javaslat',content:['1921-ben Ford konkrét javaslatot tett az Egyesült Államok Kongresszusának: az állam bocsásson ki energia-alapú pénzt. Ford „Energia-valuta" elmélete szerint minden pénzegységnek mögötte kell állnia egy mérhető munkának — és így számszerűsítve lett volna az érték.','A javaslatot elutasították. Az 1920-as évek végén a klasszikus aranystandardban még mindig hittek. De az elv forradalmi maradt: egy pénz, amely mögött valódi munka áll, valódi energia, valódi érték.']},
            {type:'btc-connection',title:'Ford és a Bitcoin',text:'Ford energia-valuta javaslata és a Bitcoin proof-of-work mechanizmusa szinte azonos logikán nyugszik: csak az a pénz lehet hiteles, amely mögött valódi, mérhető munkát — energiafelhasználást — lehet igazolni. Ford 1921-ben azt kérte, amit Satoshi 2008-ban megépített: egy munkaalapú, nem politikai, nem manipulálható pénzt. Ford halála után 61 évvel lett ennek az álomnak az implementációja.'},
            {type:'person-intro',name:'Friedrich Hayek',years:'1899–1992',role:'Közgazdász · Nobel-díjas · A pénz denacionalizálója',icon:'📜',initials:'FH',color:'linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%)',photoUrl:'images/hayek_portrait.jpg',btcConnection:'A Bitcoin az a „ravasz kerülő út", amelyről Hayek 1984-ben álmodott.'},            {type:'bio',bgImage:'images/hayek_1.png',title:'Az osztrák iskola vezéralakja',content:['Friedrich Hayek az osztrák közgazdasági iskola második nagy generációjának vezéralakja, és kétségtelenül a 20. század legbefolyásosabb libertárius gondolkodója. 1974-ben Nobel-díjat kapott gazdaságtudományban — megosztva egy marxista közgazdásszal, ami jellemző volt az ő humorára.','Hayeknek sosem volt végleges otthona. Londontól Chicágóig, majd Salzburgon keresztül végül Freiburgban halt meg. Mint az időkhöz való ragaszkodása: sosem maradt senkitől függően egy helyen.']},
            {type:'bio',bgImage:'images/hayek_2.png',title:'Az út a szolgasághoz',content:['„Az út a szolgasághoz" (1944) — Hayek élete mestermunkája. Meggyőző érvelés amellett, hogy a gazdasági tervezés szükségszerűen politikai szabadság elvesztéséhez vezet. Ha az állam kontrollálja a gazdaságot, akkor kontrollálja az életedet.','A könyv közvetlenül az 1944-es világnézet-katasztrófa után íródott, amikor a szocializmus és a fasizmus között kevés látnivaló volt. Hayek azt mutatta meg: ugyanaz a logika.']},
            {type:'bio',bgImage:'images/hayek_3.png',title:'A pénz denacionalizálása',content:['1976-ban kiadta forradalmi könyvét: „A pénz denacionalizálása". Azt javasolta, hogy az állam monopóliumát a pénzkibocsátásra meg kell szüntetni. Versenyben lévő magánvalutáknak kellene a piacon eldönteniük, melyik a legjobb pénz.','Ez volt az első szisztematikus gondolkodás az alternatív pénzrendszerekről egy Nobel-díjas közgazdásztól. Az akadémiai közösség sokszor ideaként kezelte, nem komolyan. De Hayek nagyon komolyan gondolta.']},
            {type:'bio',bgImage:'images/hayek_4.png',title:'A prófécia',content:['1984-ben — 50 évvel a Bitcoin előtt — Hayek egy BBC interjúban kimondta: „Nem várom, hogy a jó pénz visszatér mindaddig, amíg valamilyen ravasz kerülő úton becsempésszük azt, amit az állam nem tud megakadályozni."','Hayek tudta, hogy a politikai ellenállás leküzdhetetlenül nagy lenne. A pénzrendszer kontrollálása a modern államhatalom kvintesszenciája. Nem nyíltan lehet rajta változtatni. Csak „ravasz kerülő úton". Például: kóddal.']},
            {type:'btc-connection',title:'Hayek és a Bitcoin',text:'A Bitcoin pontosan az a „ravasz kerülő út", amelyről Hayek 1984-ben álmodott. Decentralizált, versenyen alapuló, senki által nem kontrollálható — mindaz, amit a „Pénz denacionalizálása" elméletben felvázolt, a Bitcoin kóddá formálta. Hayek nem érhette meg 1992-ben — nyolc évvel a Bitcoin fehér könyv előtt halt meg. De a logika neki lett volna igaza.'},
            {type:'person-intro',name:'Ludwig von Mises',years:'1881–1973',role:'Közgazdász · Praxeológus · Sound Money-apostol',icon:'📚',initials:'LM',color:'linear-gradient(135deg, #EC4899 0%, #DB2777 100%)',photoUrl:'images/mises_portrait.jpg',btcConnection:'A 21 milliós fix kínálat Mises sound money-elvének tökéletes megvalósítása.'},
            {type:'bio',bgImage:'images/mises_1.png',title:'Az emberi cselekvés',content:['Ludwig von Mises 20. századi közgazdaságtan egyik legkoherensebb rendszerét alkotta meg. „Az emberi cselekvés" (Human Action, 1949) monumentális főműve több mint 900 oldalon fejti ki a praxeológia alapjait — az emberi cselekvésekből levezetett közgazdaságtan.','Mises azt tanította: az egyéni cselekvésekből (praxis) származik az összes gazdaságtani törvény. Nincsenek „gazdasági törvények" az emberek felül — csak az emberekből.']},
            {type:'bio',bgImage:'images/mises_2.png',title:'A pénz regressziós elmélete',content:['A pénz regressziós elmélete megmagyarázza, hogy a pénznek miért volt szüksége valamilyen eredeti árucikk-értékre. A pénz nem önkényes konvenció — van előélete. Az arany pénz lett, mert aranynak mint nyersanyagnak volt használati értéke.','Ez megkülönbözteti a jó pénzt a politikailag manipulált valutától. Egy fiat-valuta bármelyik pillanatban értelmetlenné válhat — de az aranyat, vagy ma már az energiát, senki nem tud devalválni.']},
            {type:'bio',bgImage:'images/mises_3.png',title:'Sound money',content:['Sound money — a „szilárd pénz" — Mises politikai ökonómiájának alapköve. Olyan pénz, amelynek kínálatát nem lehet önkényesen növelni, amelynek értékét nem lehet politikai döntéssel csökkenteni.','Az infláció — az árszínvonal emelkedése — nem törvény. Ez politikai választás. A jegybankok és a kormányok választanak arra, hogy több pénz nyomtassanak ki. Sound money ezt lehetetlenné tenné.']},
            {type:'bio',bgImage:'images/mises_4.png',title:'A kalkulációs probléma',content:['A gazdasági kalkulációs probléma (1920): szocializmusban — ahol nincsenek valódi piaci árak — lehetetlen ésszerű gazdasági kalkulációt végezni. A szovjet tervgazdaság kudarca nem véletlen, hanem szükségszerű — matematikailag lehetetlenség.','Mises meggyőződése volt, hogy az infláció (a pénz nyomtatása) szintén egy kalkulációs probléma. A hamis árak (az állam által támogatott árak) hamis gazdasági döntésekhez vezetnek. Sound money helyreállítaná az igazságot.']},
            {type:'btc-connection',title:'Mises és a Bitcoin',text:'A Bitcoin 21 millió érmés rögzített kínálata Mises sound money-elvének tökéletes megvalósítása. A Bitcoin az energiába ágyazott proof-of-work révén nem konvenció, hanem valódi alapon nyugvó érték — pontosan ahogyan Mises megkövetelte. Senki sem képes több bitcoint nyomtatni, így senki sem tudja meginflálni.'},
            {type:'person-intro',name:'Milton Friedman',years:'1912–2006',role:'Közgazdász · Nobel-díjas · Digitális készpénz-prófétája',icon:'💵',initials:'MF',color:'linear-gradient(135deg, #10B981 0%, #059669 100%)',photoUrl:'images/friedman_portrait.jpg',btcConnection:'Friedman 1999-es próféciája szinte szó szerint leírja a Bitcoin funkcióját.'},
            {type:'bio',bgImage:'images/friedman_1.png',title:'A monetarizmus',content:['Milton Friedman a chicagói közgazdasági iskola vezéralakja. 1976-ban Nobel-díjat kapott. A Nagy Gazdasági Válság okát a Fed katasztrofális pénzszűkítő politikájában látta — nem a szabad piacot kell okozni, hanem a központi bank felelőtlenségét.','Ez kiváló megállapítás volt — és teljesen el lett hallgatva az akadémiai közösségben. Keynes népszerűbb volt. De Friedman volt az, aki helyesen értékelte.']},
            {type:'bio',bgImage:'images/friedman_2.png',title:'A k-százalékos szabály',content:['Friedman javasolta, hogy a jegybank automatikusan, évente azonos százalékkal növelje a pénzkínálatot — semmi diszkrécionalitás, semmi politikai befolyás. Ha a Fed-et nem lehet eltörölni, legalább gépiesítsük.','Ez a gondolat megelőzi a kódot, mint irányítási mechanizmust. A Bitcoin gyakorlatilag a k-százalékos szabályt valósítja meg: átlagosan 10 percenként jön létre egy új blokk, és a blokkjutalom négyévente feleződik (2024-ben 3,125 BTC/blokk), így a kibocsátás előre meghatározott, deflációs pályát követ.']},
            {type:'bio',bgImage:'images/friedman_3.png',title:'Kapitalizmus és szabadság',content:['„Kapitalizmus és szabadság" (1962) — Friedman élete mestermunkája. A gazdasági és a politikai szabadság elválaszthatatlanok. A könyv egy generáció gondolkodóját formálta meg, és azt mutatta meg: a szabad piacok jobb eredményeket hoznak, mint a tervgazdaság.','Friedman sokáig magányos volt ebben a meggyőződésben. De a logika idővel rá volt igaza. A szabad piacok jobb eredményeket hoznak, mint a tervgazdaság.']},
            {type:'bio',bgImage:'images/friedman_4.png',title:'1999: A prófécia',content:['1999-ben — már az internet kellős közepén — Friedman próféciát mondott: „Az internet egyik hiányzó darabja egy megbízható e-cash — olyan módszer, amellyel az interneten keresztül átvihetünk pénzt egyik személytől a másikhoz anélkül, hogy ők egymást ismernék vagy egy harmadik félben meg kellene bíznunk."','Friedman 2006-ban halt meg. Mindössze két évvel a Bitcoin fehér könyv előtt. De a víziót tisztán látta.']},
            {type:'btc-connection',title:'Friedman és a Bitcoin',text:'Friedman 1999-es próféciája szinte szó szerint leírja a Bitcoin funkcióját — és a Bitcoin blokklánc technológiája gyakorlatilag azt implementálja, amit Friedman elképzelt. A k-százalékos szabály, az automatikus dezentralizált kontroll, az internet feletti peer-to-peer értékátvitel — mindez Friedman gondolataiból származik.'},
            {type:'divider',number:'II',title:'A cypherpunkok',subtitle:'Azok, akik nem csupán elmélkedtek, hanem kódot írtak — és darabjait rakták le annak, ami majd Bitcoin lesz.'},
            {type:'person-intro',name:'David Chaum',years:'1955–',role:'Kriptográfus · A digitális készpénz atyja',icon:'🔐',initials:'DC',color:'linear-gradient(135deg, #F59E0B 0%, #D97706 100%)',photoUrl:'images/chaum_portrait.jpg',btcConnection:'Satoshi a DigiCash centralizált modelljét jelölte meg a megoldandó problémaként.'},
            {type:'bio',bgImage:'images/chaum_1.png',title:'A kriptográfia úttörője',content:['David Chaum a Berkeley-n szerezte PhD-jét 1982-ben, és az 1980-as évek elejétől az egyik legkiemelkedőbb kriptográfiai kutatóvá vált. 1981-ben már megalkotta az anonimizált hálózati kommunikáció alapjait (mix network) — olyan eszköz, amely lehetővé teszi az adatok átvitelét anélkül, hogy az érkezési helyét be lehetne azonosítani.','Chaum egy matematikai zseni volt — és annak az ideális alapból jött, ahol az ilyen zsenik szabad mozgást kaptak.']},
            {type:'bio',bgImage:'images/chaum_2.png',title:'A vak aláírás',content:['1983-ban publikálta a vak aláírás protokollját — a kriptográfia egyik legelegánsabb konstrukcióját. Lehetővé teszi, hogy egy dokumentumot úgy írjon alá valaki, hogy ne tudja, mit ír alá, miközben az aláírás érvényes marad. Ez elvont hangzik, de gyakorlatilag azt jelenti: egy bank aláírhatja az e-cash tokent anélkül, hogy tudná, mekkora az érték.','Az anonim szervezetektől való digitális megkülönböztethetőség — ez volt a Chaum-féle elmélet alapja.']},
            {type:'bio',bgImage:'images/chaum_3.png',title:'DigiCash és az e-Cash',content:['1990-ben megalapította a DigiCash céget és elindította az e-Cash rendszert — az első valódi kísérletet kriptográfiailag biztonságos, anonim digitális valutára. A Deutsche Bank és a Citibank is tárgyalt vele. Az ígéret nagy volt.','De az e-Cash centralizált volt. Egy szerver döntötte el, hogy mi az igazi pénz. Ez volt az alapvető hiba: a rendszer továbbra is egy központi hatóságtól függött. Ha a szervert leállítják, az egész összeomlik.']},
            {type:'bio',bgImage:'images/chaum_4.png',title:'A centralizáció buktatója',content:['Az e-Cash a centralizált modellje miatt bukott el. 1998-ban csődöt jelentett. De legalább tanulság maradt: az anonimitás és megbízhatóság együtt csak akkor tartható fenn, ha senki sem kontrollálhatja a rendszert.','Ez a lecke direkten beépült a cypherpunk mozgalomba. Hal Finney, Wei Dai, Nick Szabo — mindegyikük azt gondolta: ha Chaum e-Cash-je centralizált maradt, akkor radikálisabban kell gondolkodni. Decentralizáltan. Konszenzussal. Proof-of-work-kel.']},
            {type:'btc-connection',title:'Chaum és a Bitcoin',text:'Satoshi Nakamoto a Bitcoin white paperben közvetlenül hivatkozott Chaum munkájára, és explicit módon azonosította a DigiCash centralizált modelljét mint a megoldandó problémát. A Bitcoin a Chaum által felvetett eszközöket — a kriptográfiát, az anonimitást, a digitális aláírást — decentralizált hálózatba helyezte el.'},
            {type:'person-intro',name:'Wei Dai',years:'1976–',role:'Kriptográfus · A b-money alkotója',icon:'🌐',initials:'WD',color:'linear-gradient(135deg, #06B6D4 0%, #0891B2 100%)',btcConnection:'Satoshi fehér könyve első hivatkozásként a b-money esszét idézi.'},            {type:'bio',bgImage:'images/dai_1.png',title:'Visszahúzódó zseni',content:['Wei Dai a Washingtoni Egyetemen szerezte diplomáját számítástechnikában, majd a Microsoft Research-nél dolgozott. Csendes, szerény ember — a cypherpunk közösség kevésbé ismert, de annál fontosabb tagja.','A Crypto++ könyvtár alkotója — az egyik legjelentősebb nyílt forráskódú kriptográfiai könyvtár C++ nyelven. Rengeteg mai kriptográfiai rendszer épül erre a könyvtárra, de Wei Dai neve ismeretlenül marad.']},
            {type:'bio',bgImage:'images/dai_2.png',title:'A b-money javaslat',content:['1998-ban közzétette a b-money javaslatát — az első működőképesnek szánt decentralizált digitális pénzrendszert. A kulcsgondolat: a pénzteremtés alapja a számítási munka legyen (proof-of-work), és ezt követni kell egy decentralizált nyilvántartásban, amelyet az összes csomópont egyszerre vezet.','A b-money gyakorlatilag a Bitcoin egyenes elődje volt — csak kódban nem valósult meg a kicsit bonyolultabb distributed consensus-megoldások miatt.']},
            {type:'bio',bgImage:'images/dai_3.png',title:'Decentralizált könyvelés',content:['A b-money fundamentális eleme a decentralizált könyvelés: egyetlen hatóság sem vezeti a nyilvántartást, helyette az összes résztvevő egyszerre tárolja és ellenőrzi a tranzakciókat. Ez volt az igazi újítás.','Wei Dai azt javasolta: ha egy csomópont azt állítja, hogy 100 egységet költött el, de a ledger szerint csak 50 van, akkor a többség szavazata dönti el. Konszenzus helyett proof-of-work.']},
            {type:'bio',bgImage:'images/dai_4.png',title:'Satoshi levele',content:['Satoshi 2008 novemberében emailben kereste meg Wei Dait és azt írta: „Érdekes, hogy az e-cash és a b-money gondolatai közvetlenül elő vannak jelzezve a Bitcoin-ban."','A fehér könyv első lábjegyzetében: „Wei Dai, b-money" — ez az első és legexplicitebb szellemi köszönetnyilvánítás a Bitcoin történetében. Satoshi tudta, hogy kire építkezik.']},
            {type:'btc-connection',title:'Wei Dai és a Bitcoin',text:'A Bitcoin neve is a b-money szellemi örökségét hordozza. A proof-of-work pénzteremtés és a decentralizált könyvelés gondolata egyenesen Daitól ered — Satoshi fehér könyve első hivatkozásként idézi a b-money esszét. Wei Dai a szellemi atyja, Satoshi az implementátor.'},
            {type:'person-intro',name:'Nick Szabo',years:'1964–',role:'Informatikus · Jogász · Okosszerződés-úttörő · Bit Gold alkotója',icon:'🪙',initials:'NS',color:'linear-gradient(135deg, #EF4444 0%, #DC2626 100%)',btcConnection:'A Bit Gold a Bitcoin közvetlen prototípusa. Szabo és Satoshi ugyanaz?'},
            {type:'bio',bgImage:'images/szabo_1.png',title:'Magyar származás, kettős tudás',content:['Nick Szabo magyar születésű, aki egyszerre rendelkezik mélységes informatikai és jogi tudással. Ez a kombinált tudás lehetővé tette számára, hogy olyan perspektívából lásson a problémákra, ahonnan mások nem.','A kriptográfiai protokollokban nem csupán technikai mechanizmusokat, hanem jogi strukturákat is látott. A Bitcoin, az okosszerződések — mindez technikai kód, ami azonban jogi következményekkel bír.']},
            {type:'bio',bgImage:'images/szabo_2.png',title:'Az okosszerződés',content:['1994-ben Szabo megalkotta az okosszerződés fogalmát — egy már akkor radikális gondolatot: olyan programkód, amely automatikusan végrehajtja a szerződéses feltételeket, ha azok teljesülnek, harmadik fél nélkül.','Ez felrobbantotta volna a jogi gondolkodást — ha valakik közvetlenül kódban írnak szerződéseket, akkor nincs szükség ügyvédekre? Szabo azt javasolta: lehet. Huszonöt évvel később az Ethereum ezt teljesen megvalósította.']},
            {type:'bio',bgImage:'images/szabo_3.png',title:'Bit Gold',content:['1998-ban (a b-money mellett) Szabo kidolgozta a Bit Gold rendszert — a Bitcoin közvetlen elődjét. A szerkezet: kriptográfiai puzzle (proof-of-work), időbélyeg, decentralizált könyvelés. Szinte szó szerint azonos a Bitcoinnal, de hiányzott belőle az a rész, amit Satoshi később megoldott.','Szabo tudta, hogy nehéz lesz technikai szempontból — de nem tudta, hogy hogyan kellene a blokkokat összekapcsolni (a blokklánc technológia).']},
            {type:'bio',bgImage:'images/szabo_4.png',title:'Digitális szűkösség',content:['A digitális szűkösség megteremtése Szabo legfontosabb gondolata — és „Shelling Out" esszéjében (2002) részletesen kifejti. A pénz evolúciós eredete: a szűkösen — csak korlátozott mennyiségben — elérhető tárgyakra lett kereslet.','Szabo látta, hogy kriptográfiával leküzdhető a digitális másolhatóság akadálya. A hash-függvények ezt tudják: egy szám másolása könnyű, de egy adott hash-t előállítani csak munkával lehetséges.']},
            {type:'btc-connection',title:'Szabo és a Bitcoin',text:'A Bit Gold a Bitcoin közvetlen prototípusa: proof-of-work, decentralizált könyvelés, digitális szűkösség — minden elem megvan. A bitcoinos közösség máig vitatja: Szabo és Satoshi ugyanaz a személy? A stílusról, a logikáról, az alapgondolatokról ítélve lehetséges — de Szabo ezt sosem erősítette meg.'},
            {type:'person-intro',name:'Adam Back',years:'1970–',role:'Brit kriptográfus · Hashcash alkotója · Blockstream CEO',icon:'⛏️',initials:'AB',color:'linear-gradient(135deg, #A78BFA 0%, #9333EA 100%)',photoUrl:'images/back_portrait.jpg',btcConnection:'A Hashcash nélkül nincs proof-of-work, nincs Bitcoin.'},
            {type:'bio',bgImage:'images/back_1.png',title:'Cypherpunk levelezőlista',content:['Adam Back brit kriptográfus, aki az 1990-es évek cypherpunk levelezőlistáinak aktív résztvevőjeként fejlesztette ki azt az algoritmust, amely a Bitcoin bányászatának szívévé vált — a Hashcash-t.','A cypherpunk mozgalom a levéllistán közös: David Chaum, Hal Finney, Wei Dai, Nick Szabo, Adam Back — gyakorlatilag mindegyikük ott volt, ahol az ötletek megosztódtak és fejlődtek.']},
            {type:'bio',bgImage:'images/back_2.png',title:'Hashcash: nehéz előállítani',content:['1997-ben publikálta a Hashcash rendszert. Az ötlet egyszerű: egy email küldéséhez kriptográfiai feladatot kell megoldani. Az alapelv: „nehéz előállítani, könnyű ellenőrizni." Ez volt az első proof-of-work implementáció.','A Hashcash célja: az email spam ellen. Ha spammeléshez számítási teljesítményt kell felhasználni, akkor a spammelők elveszítik az ösztönzésüket. De az algoritmus valami sokkal fontosabb volt.']},
            {type:'bio',bgImage:'images/back_3.png',title:'SHA-1 és a proof-of-work',content:['A Hashcash SHA-1 hash-alapú proof-of-work rendszere közvetlenül beépült a Bitcoinba. Satoshi a white paperben explicit hivatkozással említi Back munkáját. A Bitcoin bányászata technikailag a Hashcash algoritmusa.','A kriptográfiai feladat egyszerű: találd meg azt az értéket, amely hash-ként egy bizonyos számú nullával kezdődik. Ez a Hashcash-ből származik.']},
            {type:'bio',bgImage:'images/back_4.png',title:'Blockstream és ma',content:['Ma Adam Back a Blockstream CEO-ja — egy olyan vállalat, amely a Bitcoin infrastruktúrán dolgozik. A cypherpunk mozgalom talán egyetlen tagja, aki a korai gondolataitól a mai intézményesített infrastruktúráig ívelő pályán maradt.','Az első cypherpunkok közül sokan eltűntek, visszavonultak, vagy más területekre mentek. Back, kivételesen, megmaradt — és továbbra is a Bitcoin fejlesztésén dolgozik.']},
            {type:'btc-connection',title:'Adam Back és a Bitcoin',text:'A Bitcoin bányászata technikailag a Hashcash proof-of-work algoritmusa. Back az egyetlen személy a white paper referenciái közül, akit Satoshi személyesen megkeresett a publikálás előtt. A Hashcash nélkül nincs proof-of-work, nincs Bitcoin — nincs semmi.'},
            {type:'person-intro',name:'Hal Finney',years:'1956–2014',role:'Kriptográfus · PGP fejlesztő · Az első Bitcoin-tranzakció fogadója',icon:'🏃',initials:'HF',color:'linear-gradient(135deg, #06B6D4 0%, #0891B2 100%)',photoUrl:'images/finney_portrait.jpg',btcConnection:'„Running bitcoin" — az első nyilvános mondat a Bitcoinról.'},
            {type:'bio',bgImage:'images/finney_1.png',title:'PGP és a cypherpunkok',content:['Hal Finney a Caltech-en szerezte diplomáját, majd a PGP fejlesztőcsapatában dolgozott Phil Zimmermann alatt. A cypherpunk mozgalom egyik legaktívabb tagja volt — folyamatosan kódolt, tesztelt és hozzájárult. A PGP (Pretty Good Privacy) az első kommerciális kriptográfiai szoftver volt, amely az átlagemberek számára is elérhetővé tette az end-to-end titkosítást.']},
            {type:'bio',bgImage:'images/finney_2.png',title:'RPOW',content:['2004-ben kifejlesztette az RPOW-t (Reusable Proofs of Work) — egy olyan rendszert, amely a Hashcash alapján épített, de megpróbálta a proof-of-work eredményét átruházható értékegységgé tenni.','Az RPOW szinte a Bit Gold és a Bitcoin közötti közvetítő volt — Finney felismerte, hogy ha a proof-of-work átruházható, akkor már szinte pénz. De továbbra is centralizált szerver kellett.']},
            {type:'bio',bgImage:'images/finney_3.png',title:'Running bitcoin',content:['2009. január 12-én fogadta az első Bitcoin-tranzakciót — Satoshi küldte neki 10 BTC. Ez a tranzakció például olyan jelentős, mint az első email vagy az első weblap. Hal Finney az első valódi Bitcoin-felhasználó.','Finney január 11-én tweetelte: „Running bitcoin" — az első publikus bejelentés arról, hogy valaki futtatja a Bitcoin szoftvert. Ez volt az első nyilvános mondat, amely elárulta: valami létezik.']},
            {type:'bio',bgImage:'images/finney_4.png',title:'Örökség',content:['2009-ben diagnosztizálták az ALS-t (a Lou Gehrig-féle betegség). Az egyre súlyosabb neurológiai betegség ellenére folytatta a Bitcoin-fejlesztést és az email-levelezésben való részvételt.','2014-ben hunyt el — testét krionikus tartósítással hűtötték le. Hal Finney az első igazi Bitcoin-hitvalló volt. Halála után is a Bitcoin-közösség előtte tiszteleg — az UTXO-k egy részét „Finney coins"-nek nevezik.']},
            {type:'btc-connection',title:'Hal Finney és a Bitcoin',text:'Finney az első valódi Bitcoin-felhasználó, az első tranzakció fogadója és az egyik első fejlesztő. Az RPOW közvetlen technológiai előzménye a Bitcoin proof-of-work rendszerének. „Running bitcoin" — az első nyilvános mondat, amely bejelentette: a Bitcoin létezik.'},
            {type:'divider',number:'III',title:'Az összekötő',subtitle:'Aki megtalálta a hiányzó darabot, összerakta a kirakóst — majd eltűnt.'},
            {type:'person-intro',name:'Satoshi Nakamoto',years:'??? – ???',role:'Ismeretlen · A Bitcoin alkotója · Az összekötő',icon:'₿',initials:'SN',color:'linear-gradient(135deg, #F7931A 0%, #FF6B35 100%)',btcConnection:'Összegyűjtötte és összerakta a darabokat. A Bitcoin senkié — azaz mindenkié.'},            {type:'bio',bgImage:'images/satoshi_1.png',title:'2008. október 31.',content:['Egy ismeretlen személy „Satoshi Nakamoto" álnéven publikálta a Bitcoin white papert: „Bitcoin: A Peer-to-Peer Electronic Cash System." Kilenc oldalon leírta azt, amin mások évtizedekig dolgoztak — és amely ma több mint egybillió dollárt ér.','Az email, amely bejelentette a white papért, a cypherpunk levelezőlistára küldték. Az volt az első és szinte az egyetlen kapcsolódási pont: akik az önálló pénzről gondolkodtak, azok most tudják, hogy ez lehetséges.']},
            {type:'bio',bgImage:'images/satoshi_2.png',title:'A genesis block',content:['2009. január 3-án bányászta ki a genesis blockot — az első Bitcoin blokk, amely nem mutat vissza egy előző blokkra (mivel nem volt). Belekódolta a The Times főcímét: „Chancellor on brink of second bailout for banks".','Ez egyszerre üzenet és dátumbélyeg: a Bitcoin születésének pillanata pontosan 2009. január 3., amikor a világ gazdasági válságban összeomlásával küszködött. Ez nem volt véletlen.']},
            {type:'bio',bgImage:'images/satoshi_3.png',title:'A blokklánc megoldás',content:['A blokklánc Satoshi valódi hozzájárulása: nem az egyes komponensek (proof-of-work, digitális aláírás, decentralizált könyvelés) voltak újak, hanem ezek egyedi kombinációja — és a nehézségi igazítás, valamint a leghosszabb lánc szabálya.','A blokkláncban a blokkok időrendileg láncolódnak össze: ha valaki egy régi tranzakciót próbálna módosítani, akkor az összes később létrejött blokk hibás lenne. Ez a megoldás Satoshi lángészének a váza — a hiányzó láncszem.']},
            {type:'bio',bgImage:'images/satoshi_4.png',title:'Az eltűnés',content:['Satoshi körülbelül 1 millió bitcoint bányászott az első éveiben — ebből az értékből ma csaknem 90 milliárd dollár lenne. Ez az érték szinte sosem mozdult egy blokkból. 2011-ben Satoshi véglegesen visszavonult.','Az eltűnés maga is zsenialitás: a Bitcoin valóban senkié lett — azaz mindenkié. Nem volt egy karizmatikus vezető, aki körül csoportosulnak az emberek. A rendszer tisztán algoritmikus maradt.']},
            {type:'btc-connection',title:'Satoshi Nakamoto',text:'Satoshi nem talált fel semmit új: összegyűjtötte és összerakta a darabokat. Tesla energia-víziója, Ford munkaalapú értéke, Hayek pénzversenye, Mises sound money-ja, Friedman digitális készpénze, Chaum kriptográfiája, Dai b-money-ja, Szabo Bit Goldje, Back Hashcash-e, Finney RPOW-ja — mindez benne van a Bitcoin white paperben. De a szintézis? Az a Satoshié.'},
            {type:'closing',quote:'Az igazságot nem feltalálják. Az igazságot felfedezik.',boxes:[{icon:'⚡',title:'Energia = Érték',text:'Tesla és Ford intuíciója: a munka és az energia adják az érték alapját.'},{icon:'📜',title:'Szabad pénz',text:'Hayek és Mises látomása: a pénz nem lehet az állam monopóliuma.'},{icon:'🔐',title:'Decentralizáció',text:'Chaum és a cypherpunkok tanulsága: senkire nem szabad bízni.'},{icon:'₿',title:'Az összekötő',text:'Satoshi megtalálta: a keresett szintézis a blokklánc.'}]}
        ];

        let currentSlide = 0;

        function initializePresentation() {
            renderSlide(0);
            updateControls();
        }

        function renderSlide(index) {
            const container = document.getElementById('slideContainer');
            container.innerHTML = '';

            const slide = slides[index];
            const slideElement = document.createElement('div');
            slideElement.className = `slide ${slide.type} active`;

            switch(slide.type) {
                case 'hero':                    slideElement.innerHTML = `<div class="hero-badge">${slide.badge}</div><h1 class="hero-title">${slide.title}</h1><p class="hero-subtitle">${slide.subtitle}</p><p class="hero-quote">${slide.quote}</p>`;
                    break;
                case 'divider':
                    slideElement.innerHTML = `<div class="divider-number">${slide.number}</div><h2 class="divider-title">${slide.title}</h2><p class="divider-subtitle">${slide.subtitle}</p>`;
                    break;
                case 'person-intro':
                    const portraitStyle = slide.photoUrl
                        ? `background-image: url('${slide.photoUrl}'); background-size: cover; background-position: center top;`
                        : `background: ${slide.color};`;
                    const portraitContent = slide.photoUrl ? '' : slide.initials;
                    slideElement.innerHTML = `<div class="person-portrait" style="${portraitStyle}">${portraitContent}</div><div class="person-icon">${slide.icon}</div><h2 class="person-name">${slide.name}</h2><p class="person-years">${slide.years}</p><p class="person-role">${slide.role}</p><div class="btc-connection-box">${slide.btcConnection}</div>`;
                    break;
                case 'bio':
                    slideElement.innerHTML = `<div class="bio-header" style="background-image: url('${slide.bgImage}');"><h3 class="bio-title">${slide.title}</h3></div><div class="bio-content">${slide.content.map(para => `<p class="bio-text">${para}</p>`).join('')}</div>`;
                    break;
                case 'btc-connection':
                    slideElement.innerHTML = `<div class="btc-connection-content"><div class="btc-icon-large">₿</div><h2 class="btc-connection-title">${slide.title}</h2><p class="btc-connection-text">${slide.text}</p></div>`;
                    break;
                case 'closing':
                    slideElement.innerHTML = `<h2 class="closing-quote">${slide.quote}</h2><div class="closing-boxes">${slide.boxes.map(box => `<div class="closing-box"><div class="closing-box-icon">${box.icon}</div><h3 style="color: #F7931A; margin-bottom: 10px;">${box.title}</h3><p class="closing-box-text">${box.text}</p></div>`).join('')}</div>`;
                    break;
            }

            container.appendChild(slideElement);
            const progress = ((index + 1) / slides.length) * 100;            document.querySelector('.progress-fill').style.width = progress + '%';
            document.getElementById('currentSlide').textContent = index + 1;
        }

        function updateControls() {
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide(currentSlide);
                updateControls();
            }
        }

        function previousSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide(currentSlide);
                updateControls();
            }
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                previousSlide();
            }
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            if (touchStartX - touchEndX > 50) {
                nextSlide();
            } else if (touchEndX - touchStartX > 50) {
                previousSlide();
            }
        });
        initializePresentation();
    </script>
</body>
</html>
