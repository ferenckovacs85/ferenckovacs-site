<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Bitcoin nem feltalálmány — hanem felfedezés</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #F7931A;
    --orange-dim: rgba(247,147,26,0.15);
    --orange-glow: rgba(247,147,26,0.3);
    --bg: #0D1117;
    --bg2: #161B22;
    --bg3: #21262D;
    --text: #E6EDF3;
    --muted: #8B949E;
    --border: rgba(247,147,26,0.25);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #F7931A, #FFB347, #F7931A);
    background-size: 200% 100%;
    animation: progress-shine 2s linear infinite;
    transition: width 0.5s ease;
    z-index: 100;
  }
  @keyframes progress-shine {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  #slides-container { position: fixed; inset: 0; }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.7s ease, transform 0.7s ease;
    pointer-events: none;
    padding: 60px 24px 100px;
    overflow: hidden;
  }
  .slide.active { opacity: 1; transform: translateY(0); pointer-events: all; }
  .slide.exit-left { opacity: 0; transform: translateY(-40px); }

  /* HERO */
  .hero-slide {
    background: radial-gradient(ellipse at 50% 30%, rgba(247,147,26,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(247,147,26,0.06) 0%, transparent 50%),
                var(--bg);
  }
  .hero-tag { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--orange); margin-bottom: 24px; opacity: 0.8; }
  .hero-slide h1 {
    font-size: clamp(28px, 5vw, 52px); font-weight: 900; text-align: center; line-height: 1.15; max-width: 800px;
    background: linear-gradient(135deg, #fff 40%, var(--orange) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 20px;
  }
  .hero-sub { font-size: clamp(14px, 2vw, 18px); color: var(--muted); text-align: center; max-width: 600px; line-height: 1.6; margin-bottom: 36px; }
  .hero-quote { border-left: 3px solid var(--orange); padding: 16px 24px; max-width: 560px; color: var(--muted); font-style: italic; font-size: 15px; line-height: 1.7; background: var(--orange-dim); border-radius: 0 12px 12px 0; }
  .hero-badge { margin-top: 36px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .hero-badge span { background: var(--orange-dim); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; color: var(--orange); font-weight: 600; }

  /* DIVIDER */
  .divider-slide { background: var(--bg); }
  .divider-inner { text-align: center; }
  .divider-num { font-size: 80px; font-weight: 900; line-height: 1; background: linear-gradient(135deg, var(--orange) 0%, rgba(247,147,26,0.3) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 16px; }
  .divider-slide h2 { font-size: clamp(22px, 4vw, 40px); font-weight: 800; margin-bottom: 12px; }
  .divider-slide p { color: var(--muted); font-size: 16px; max-width: 500px; }
  .divider-line { width: 80px; height: 3px; background: var(--orange); margin: 20px auto; border-radius: 2px; }

  /* PERSON INTRO */
  .person-intro { gap: 32px; }
  .portrait-ring { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--orange); box-shadow: 0 0 30px var(--orange-glow); overflow: hidden; flex-shrink: 0; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 56px; }
  .portrait-ring img { width: 100%; height: 100%; object-fit: cover; object-position: top center; filter: grayscale(15%); }
  .intro-content { text-align: center; max-width: 580px; }
  .person-years { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); margin-bottom: 8px; }
  .intro-content h2 { font-size: clamp(28px, 5vw, 48px); font-weight: 900; margin-bottom: 8px; }
  .person-role { font-size: 14px; color: var(--muted); font-weight: 500; margin-bottom: 20px; }
  .intro-text { font-size: 15px; line-height: 1.75; color: #C9D1D9; max-width: 540px; }

  /* BIO */
  .person-bio { align-items: flex-start; justify-content: flex-start; padding-top: 80px; overflow: hidden; }
  .bio-inner { width: 100%; max-width: 740px; margin: 0 auto; display: flex; flex-direction: column; height: calc(100vh - 180px); }
  .bio-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-shrink: 0; }
  .bio-icon { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--orange), #FF6B35); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .bio-header h3 { font-size: 20px; font-weight: 700; }
  .bio-sub-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .bio-body { flex: 1; overflow-y: auto; padding-right: 8px; scrollbar-width: thin; scrollbar-color: var(--orange) transparent; }
  .bio-body::-webkit-scrollbar { width: 4px; }
  .bio-body::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 2px; }
  .bio-body p { font-size: 15px; line-height: 1.8; color: #C9D1D9; margin-bottom: 16px; }

  /* BTC CONNECTION */
  .btc-slide {
    background: linear-gradient(135deg, #0D1117 0%, #1a1000 25%, #0D1117 50%, #110800 75%, #0D1117 100%);
    background-size: 400% 400%;
    animation: gradient-shift 8s ease infinite;
    overflow-y: auto;
  }
  @keyframes gradient-shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .btc-slide::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 50%, rgba(247,147,26,0.08) 0%, transparent 70%); pointer-events:none; }
  .btc-inner { position:relative; z-index:1; width:100%; max-width:700px; display:flex; flex-direction:column; align-items:center; gap:22px; padding: 10px 0; }
  .btc-symbol { font-size:60px; line-height:1; color:var(--orange); animation:pulse-btc 2.5s ease-in-out infinite; display:block; filter:drop-shadow(0 0 20px var(--orange-glow)); }
  @keyframes pulse-btc {
    0%,100%{transform:scale(1);opacity:.85;filter:drop-shadow(0 0 12px rgba(247,147,26,.4))}
    50%{transform:scale(1.12);opacity:1;filter:drop-shadow(0 0 28px rgba(247,147,26,.7))}
  }
  .btc-slide-title { font-size:12px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--orange); text-align:center; }
  .btc-quote { background:rgba(247,147,26,0.08); border:1px solid rgba(247,147,26,0.3); border-radius:16px; padding:20px 28px; text-align:center; max-width:620px; width:100%; }
  .quote-text { font-size:clamp(15px,2.2vw,21px); font-weight:700; color:var(--text); line-height:1.5; margin-bottom:8px; font-style:italic; }
  .quote-attr { font-size:12px; color:var(--orange); font-weight:600; }
  .btc-timeline { display:flex; align-items:center; flex-wrap:wrap; justify-content:center; }
  .tl-item { display:flex; flex-direction:column; align-items:center; text-align:center; }
  .tl-year { font-size:10px; font-weight:700; color:var(--orange); letter-spacing:1px; margin-bottom:4px; }
  .tl-dot { width:11px; height:11px; border-radius:50%; background:var(--orange); box-shadow:0 0 8px var(--orange-glow); }
  .tl-label { font-size:11px; color:var(--muted); margin-top:4px; max-width:80px; }
  .tl-line { width:36px; height:2px; background:linear-gradient(90deg,var(--orange),rgba(247,147,26,.3)); margin-bottom:16px; }
  .btc-box { background:rgba(247,147,26,0.06); border:1px solid rgba(247,147,26,0.25); border-radius:12px; padding:18px 24px; max-width:620px; width:100%; }
  .btc-box-title { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--orange); margin-bottom:8px; }
  .btc-box p { font-size:13.5px; line-height:1.7; color:#C9D1D9; }
  .btc-tags { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
  .btc-tag { background:var(--orange-dim); border:1px solid var(--border); color:var(--orange); font-size:11px; font-weight:600; padding:4px 12px; border-radius:20px; }

  /* CLOSING */
  .closing-slide { background:radial-gradient(ellipse at center,rgba(247,147,26,.1) 0%,transparent 65%),var(--bg); }
  .closing-quote { font-size:clamp(20px,3.5vw,36px); font-weight:800; text-align:center; max-width:680px; line-height:1.4; margin-bottom:40px; background:linear-gradient(135deg,#fff 60%,var(--orange) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .grid-boxes { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; max-width:620px; width:100%; }
  .grid-box { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
  .gb-icon { font-size:28px; margin-bottom:8px; }
  .gb-title { font-size:13px; font-weight:700; color:var(--orange); margin-bottom:6px; }
  .gb-text { font-size:13px; color:var(--muted); line-height:1.6; }

  /* CONTROLS */
  #controls { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:8px; background:rgba(22,27,34,.85); backdrop-filter:blur(20px); border:1px solid rgba(247,147,26,.2); border-radius:40px; padding:10px 20px; z-index:50; }
  .ctrl-btn { background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; padding:4px 10px; border-radius:20px; transition:background .2s,color .2s; line-height:1; }
  .ctrl-btn:hover { background:var(--orange-dim); color:var(--orange); }
  .ctrl-btn.active-play { color:var(--orange); }
  #counter { font-size:13px; font-weight:600; color:var(--muted); min-width:52px; text-align:center; }

  @media(max-width:640px){
    .slide{padding:56px 16px 90px}
    .portrait-ring{width:100px;height:100px}
    .btc-quote{padding:14px 16px}
    .grid-boxes{grid-template-columns:1fr}
    .tl-line{width:22px}
    .bio-inner{max-width:100%}
    #controls{padding:8px 12px;gap:4px}
  }
</style>
</head>
<body>
<div id="progress-bar" style="width:0%"></div>
<div id="slides-container"></div>
<div id="controls">
  <button class="ctrl-btn" id="btn-prev">&#8249;</button>
  <span id="counter">1 / 38</span>
  <button class="ctrl-btn" id="btn-next">&#8250;</button>
  <button class="ctrl-btn" id="btn-play">&#9654;</button>
</div>

  {t:'bio', emoji:'⚡', name:'Nikola Tesla', sub:'Az energia vizionáriusa', paras:[

  {t:'bio', emoji:'🚗', name:'Henry Ford', sub:'A futószalag és az energiavaluta', paras:[

    'Ludwig von Mises 1881-ben született az Osztrák–Magyar Monarchiában. Bécsben szerzett jogi és közgazdasági doktorátust, és magánszemináriumain az osztrák közgazdasági iskola meghatározó gondolkodóit nevelte — köztük Friedrich Hayeket.',
    'A szocializmus (1922) c. könyvében elsőként bizonyította be a szocialista gazdasági kalkuláció lehetetlenségét: ha nincs magántulajdon a termelési javak felett, nem keletkeznek valódi árak, és a gazdasági döntéshozatal elveszíti tájékozódási pontjait.',
    'Pénz regressziós tétele szerint (Theory of Money and Credit, 1912) a pénznek az alapján van értéke, hogy tegnap is volt értéke — ha visszafelé követjük ezt a regressziót, eljutunk egy olyan pillanathoz, amikor az adott dolog csereáruként piacra lépett. Ez látszólag kizárja a Bitcoin létezésének lehetőségét — de az első satoshi tranzakcióval a Bitcoin is belépett ebbe a láncolatba.',
    'Az Emberi cselekvés (1949) a praxeológia monumentuma — 900 oldalon. Mises szerint a sound money, az állam által nem manipulálható, rögzített kínálatú pénz, az egyéni szabadság egyik alapfeltétele: "meg kell akadályozni a kormányzatot a pénz rontásában."']},
  {t:'btc', emoji:'📚', name:'Mises és a Bitcoin',
    quote:'"A sound money elve az emberi szabadság nagy vívmánya — és ugyanolyan fontos a piacgazdaság számára, mint a politikai alkotmány."',
    qa:'Ludwig von Mises, Emberi cselekvés',
    tl:[{y:'1912',l:'Regressziós tétel'},{y:'1949',l:'Emberi cselekvés'},{y:'2009',l:'Bitcoin: 21M limit'},{y:'∞',l:'Sound money'}],
    box:'A Bitcoin a misesi sound money gondolat digitális megvalósítása. Az algoritmikusan rögzített 21 millió érmés kínálat pontosan az, amit Mises követelt: olyan pénz, amelyet a kormányzat nem tud inflálni, hígítani vagy kisajátítani. A regressziós tétel? A Bitcoin első tranzakciójával belépett a láncolatba.',
    tags:['Sound money','21M rögzített kínálat','Regressziós tétel','Kalkulációs probléma']},
  // 14-16 FRIEDMAN
  {t:'intro', emoji:'💵', name:'Milton Friedman', years:'1912 — 2006', role:'Amerikai közgazdász, Nobel-díjas 1976',
    img:'https://upload.wikimedia.org/wikipedia/commons/2/20/Portrait_of_Milton_Friedman.jpg',
    text:'Milton Friedman a 20. század legbefolyásosabb közgazdásza volt, a monetarizmus atyja és a szabad piacok leghatékonyabb szószólója. 1999-ben — pontosan tíz évvel a Bitcoin születése előtt — megjósolta az internet digitális készpénzének szükségességét, amelyet megbízható harmadik fél nélkül lehet tranzakcióhoz használni.'},
  {t:'bio', emoji:'💵', name:'Milton Friedman', sub:'Monetarizmus és a digitális készpénz próféciája', paras:[
    'Milton Friedman 1912-ben született New Yorkban, és a Chicagói Egyetemen töltötte fényes akadémiai karrierjét. A Monetáris Történet az Egyesült Államokban (1963) megmutatta, hogy a Nagy Gazdasági Válságot a Federal Reserve helytelen politikája mélyítette el — ez az érv alapjaiban írta át a makroökonómiát.',
    'A Kapitalizmus és szabadság (1962) az egyéni szabadság gazdasági alapjait fejtette ki: a szabad piac az egyedüli rendszer, amely képes az egyéni szabadságot és a gazdasági jólétet egyszerre maximalizálni. Friedman a negatív jövedelemadót, az utalványrendszert az oktatásban és a lebegő árfolyamot propagálta.',
    'A k-százalék szabály Friedman monetáris programjának sarkköve volt: az állam rögzítse a pénzkínálat növekedési ütemét egy állandó százalékban, és semmi mást ne csináljon. A Fed diszkrecionális politikáját alapvetően károsnak tartotta — a Bitcoin protokollja pontosan ezt a gondolatot rögzíti kódban.',
    '1999-ben az NTU Foundation interjújában Friedman azt mondta: "Az internet hiányzó pillére az e-cash — egy módszer, amellyel az interneten A-tól B-nek pénzt lehet átutalni anélkül, hogy A tudná, ki B." Tíz évvel később Satoshi kóddá formálta ezt.']},
  {t:'btc', emoji:'💵', name:'Friedman és a Bitcoin',
    quote:'"Az internet egyetlen hiányzó pillére egy megbízható e-cash — mód, amely lehetővé teszi, hogy az interneten pénzt utalj át anélkül, hogy bárki tudná, ki fizet kinek."',
    qa:'Milton Friedman, 1999',
    tl:[{y:'1999',l:'Friedman jóslata'},{y:'2008',l:'Bitcoin white paper'},{y:'2009',l:'Genesis block'},{y:'∞',l:'Digitális készpénz'}],
    box:'Friedman 1999-es interjúja a Bitcoin legpontosabb előrejelzése. A "megbízható harmadik fél nélküli" értéktranszfer pontosan az, amit Satoshi tíz évvel később megoldott. A k-százalék szabály digitális megtestesítése a Bitcoin halvening ciklusa: algoritmikus, előre látható, senki által meg nem változtatható monetáris politika.',
    tags:['1999 prófécia','E-cash','K-százalék → halvening','Digitális készpénz']},

  // 18-20 CHAUM
  {t:'intro', emoji:'🔐', name:'David Chaum', years:'1955 —', role:'Amerikai kriptográfus, a digitális adatvédelem atyja',
    img:null,
    text:'David Chaum a digitális személyes adatvédelem mozgalmának megalapítója és az első funkcionáló digitális pénz, a DigiCash megalkotója. A vak aláírás protokollja és a mix hálózatok koncepciója azok az alapkövek, amelyekre minden későbbi kriptopénz-kísérlet épül.'},
  {t:'bio', emoji:'🔐', name:'David Chaum', sub:'Vak aláírás és DigiCash', paras:[
    'David Chaum a Berkeleyi Egyetemen doktorált informatikából, és már 1981-ben forradalmi cikket publikált "Untraceable Electronic Mail" címmel. Ebben megalkotta a mix network koncepcióját: az üzenetek egy láncon keresztül ugrálnak, és minden csomópont csak az előző és a következő ugrást ismeri. Ez ma a Tor hálózat alapelve.',
    'A vak aláírás (blind signature, 1983) Chaum legfontosabb kriptográfiai találmánya: a bank hitelesíti az érme értékét anélkül, hogy tudná, ki a tulajdonos. Ez az adatvédelmi alapelv teszi lehetővé az anonim digitális fizetést — és a Bitcoin-tranzakciók privátságának egyik inspirációja.',
    'A DigiCash (1990) az első ténylegesen működő digitális pénzrendszer volt. Chaum Hollandiában alapított céget, és sikerült több bankot is partnersége megnyerni, köztük a Mark Twain Bankot az USA-ban. Az internetes fizetés 1994-ben még teljesen ismeretlen fogalom volt — Chaum évekkel megelőzte korát.',
    'A DigiCash 1998-ban csődbe ment. Chaum ragaszkodott a centralizált kibocsátói modellhez: a DigiCash cég volt a pénz kibocsátója, és ha a cég megbukik, a pénz elhal. Ez a tanulság — hogy a digitális pénznek nem lehet egyetlen felelős kibocsátója — a Bitcoin legfontosabb tervezési döntésének alapja.']},
  {t:'btc', emoji:'🔐', name:'Chaum és a Bitcoin',
    quote:'"Ha a rendszernek egyetlen megbízható pontja van, az a rendszer Achilles-sarka. A bizalom decentralizálása nem opció — szükségszerűség."',
    qa:'David Chaum gondolati öröksége a DigiCash bukása után',
    tl:[{y:'1983',l:'Vak aláírás'},{y:'1990',l:'DigiCash'},{y:'1998',l:'Csőd → tanulság'},{y:'2009',l:'Bitcoin: nincs center'}],
    box:'A Bitcoin Chaum két felfedezésén épül: a vak aláíráson és a DigiCash bukásának tanulságán. Satoshi kódjában a DigiCash centralizmusa ellen lép: nincs DigiCash Inc., nincs kibocsátó, amely csődbe mehet — csak matematika és a hálózat.',
    tags:['Vak aláírás 1983','DigiCash 1990','Centralizáció = halál','Adatvédelem by design']},
  // 21-23 WEI DAI
  {t:'intro', emoji:'🌐', name:'Wei Dai', years:'1970-es évek —', role:'Kínai-amerikai kriptográfus, a b-money megalkotója',
    img:null,
    text:'Wei Dai a Washingtoni Egyetemen szerzett végzettséget, majd a Microsoftnál dolgozott kriptográfusként. 1998-ban publikált b-money protokollja az első olyan rendszer volt, amely a számítási munka alapú pénzteremtést kombinálta a decentralizált nyilvántartással — Satoshi a Bitcoin white paper-ben hivatkozott rá.'},
  {t:'bio', emoji:'🌐', name:'Wei Dai', sub:'b-money és a számítási munka alapú pénz', paras:[
    'Wei Dai a Cypherpunk levelezőlista egyik legaktívabb tagja volt a 90-es évek második felében. A lista 1992-ben indult Timothy May "A kriptoanarchisták kiáltványa" hatására, és a digitális adatvédelem, az anonim kommunikáció és a digitális pénz mozgalmának szellemi inkubátora volt.',
    'A b-money (1998) Wei Dai rövid, de monumentális írása. Az alapötlet: a pénz akkor jön létre, amikor valaki elvégez egy "nehéz számítási munkát" — mai szóval: proof-of-work bányászatot. A létrehozott pénzt az egész hálózat nyilvántartja, és a tranzakciókat digitális aláírásokkal hitelesítik.',
    'Két kritikus ponton hagyta megoldatlan a b-money-t: hogyan jutnak konszenzusra az elosztott nyilvántartók, és hogyan akadályozható meg a double-spend centralizált entitás nélkül. Pontosan ezeket oldotta meg Satoshi a Nakamoto-konszenzussal és a blokkláncstruktúrával.',
    'A Crypto++ könyvtár az egyik legszélesebb körben használt nyílt forráskódú kriptográfiai könyvtár — Wei Dai ennek alapszerzője. Satoshi a white paper írása előtt közvetlenül e-mailt váltott Wei Daivel, és a white paper első bekezdésében hivatkozik rá.']},
  {t:'btc', emoji:'🌐', name:'Wei Dai és a Bitcoin',
    quote:'"A b-money ötlete: hozd létre a pénzt számítási munkával — és ne legyen senki, akit ki lehet kapcsolni."',
    qa:'Wei Dai b-money (1998) — összefoglalt alapelv',
    tl:[{y:'1998',l:'b-money'},{y:'2008',l:'Satoshi e-mail'},{y:'2009',l:'Bitcoin = b-money++'},{y:'∞',l:'Számítás → Pénz'}],
    box:'A Bitcoin a b-money közvetlen leszármazottja. Satoshi a white paper-ben két referenciát közöl: Wei Dai b-money-ja és Adam Back Hashcash-e. A proof-of-work mint pénzteremtési mechanizmus Wei Dai találmánya — Satoshi a Nakamoto-konszenzussal egészítette ki, megoldva a nyitott kérdéseket.',
    tags:['b-money 1998','PoW mint pénzteremtés','Első Satoshi hivatkozás','Crypto++ könyvtár']},
  // 24-26 SZABO
  {t:'intro', emoji:'🪙', name:'Nick Szabo', years:'1964 —', role:'Magyar–amerikai informatikus, jogász, kriptográfus',
    img:null,
    text:'Nick Szabo magyar származású, az okosszerződések (smart contracts) fogalmának megalkotója és a Bit Gold protokoll tervezője — amelyet számos elemző a Bitcoin közvetlen elődjének tart. A "Shelling Out: az előpénz eredete" esszéje a pénz evolúciójának egyik legmélyebb elemzése.'},
  {t:'bio', emoji:'🪙', name:'Nick Szabo', sub:'Okosszerződések, Bit Gold és digitális szűkösség', paras:[
    'Nick Szabo a Washingtoni Egyetemen szerzett informatikai végzettséget, majd jogász-diplomát is szerzett — ez az egyedülálló kombináció tette képessé arra, hogy a jogi szerződések logikáját számítógépes kódban formalizálja. Az okosszerződések (smart contracts) gondolata 1994-ből származik.',
    'A Bit Gold (1998, formálisan 2005-ben publikálva) a Bitcoin legszorosabb elődje. Az elv: a proof-of-work által megoldott kriptográfiai puzzle-okból keletkező digitális "munka" örökre rögzítve marad a blokkláncban, és értékes, mert szűkös és nehéz előállítani. A "digitális szűkösség" koncepciója Szabotól ered.',
    'A "Shelling Out: az előpénz eredete" (2002) esszé megmutatja, hogy a gyűjtött, hordozható, nehezen hamisítható és szűkös tárgyak az emberi csere alapját képezték az egész történelem során — és hogy a Bitcoin ugyanezt az ős-monetáris logikát viszi tovább digitális formában.',
    'Szabo soha nem erősítette meg, hogy ő lenne Satoshi Nakamoto — bár stíluselemzések és időbeli egybeesések sokakat meggyőztek erről. Tény, hogy a Bitcoin-protokoll számos elemet átvett a Bit Gold tervéből.']},
  {t:'btc', emoji:'🪙', name:'Szabo és a Bitcoin',

    tl:[{y:'1994',l:'Okosszerződés'},{y:'1998',l:'Bit Gold ötlet'},{y:'2005',l:'Bit Gold publikus'},{y:'2009',l:'Bitcoin = Bit Gold++'}],
    box:'A Bitcoin szinte teljes egészében a Bit Gold tervéből nőtt ki. Az okosszerződések ma az Ethereum alapja. A digitális szűkösség gondolata — hogy szoftver alapú objektumnak is lehet valódi értéke, ha nehéz előállítani — Szabotól ered, és ez a Bitcoin legfontosabb metafizikai újítása.',
    tags:['Bit Gold 1998','Okosszerződések 1994','Digitális szűkösség','Magyar kapcsolat']},
  // 27-29 BACK
  {t:'intro', emoji:'⛏️', name:'Adam Back', years:'1970 —', role:'Brit kriptográfus, a Blockstream vezérigazgatója',
    img:null,
    text:'Adam Back brit kriptográfus és a Hashcash proof-of-work rendszer megalkotója. Az 1997-es Hashcash algoritmus — amelyet eredetileg spam szűrésére tervezett — adja a Bitcoin bányászatának kriptográfiai alapját. Back ma a Blockstream vezérigazgatója.'},
  {t:'bio', emoji:'⛏️', name:'Adam Back', sub:'Hashcash és a proof-of-work', paras:[
    'Adam Back az Exeter Egyetemen szerzett informatikai doktorátust. A 90-es évek elején a Cypherpunk mozgalom aktív tagja volt. Back az exportellenőrzési szabályok megkerülésének egyik legismertebb aktivistája volt — a PGP kódját szó szerint pólóra nyomtatva terjesztette.',
    'A Hashcash (1997) elvét egy mondatban lehet összefoglalni: "Legyen nehéz egy e-mailt küldeni — de csak annyira, amennyire egy spammelőnek gondot okoz tömegesen." A protokoll egy kriptográfiai puzzle megoldását kéri el az e-mail fejlécben.',
    'A Hashcash elve: "nehéz előállítani, könnyű ellenőrizni." Ez pontosan a Bitcoin bányászatának logikája: egy hash kiszámítása milliárd próbálkozást igényel, de az eredmény ellenőrzése egyetlen számítással elvégezhető. Satoshi a white paper-ben közvetlenül hivatkozott a Hashcash-re.',
    'Back ma a Blockstream vezérigazgatója, amely a Bitcoin fejlesztői infrastruktúrájának és az oldallánc-technológiák egyik meghatározó szereplője. Back az egyik legismertebb Bitcoin maximalist — aki szerint a Bitcoin az egyedüli lehetséges végállapot a digitális pénz evolúciójában.']},
  {t:'btc', emoji:'⛏️', name:'Back és a Bitcoin',
    quote:'"Légy kénytelen dolgozni azért, amit igényelsz. Ez nem büntetés — ez a becsületes rendszer alapelve."',

    tl:[{y:'1997',l:'Hashcash'},{y:'2008',l:'Satoshi hivatkozás'},{y:'2009',l:'Bitcoin mining'},{y:'2014',l:'Blockstream CEO'}],
    box:'A Bitcoin bányászati algoritmus közvetlen forráskódját Adam Back Hashcash protokolljára vezeti vissza Satoshi maga. A SHA-256 alapú proof-of-work, a nonce keresése, a target nehézségi beállítás — ezek mind a Hashcash elvén alapulnak. Back az első ember, akinek Satoshi elküldte a Bitcoin white paper pre-print verzióját — 2008. október 31-én.',
    tags:['Hashcash 1997','Nehéz előállítani','Könnyű ellenőrizni','Első white paper olvasó']},
  // 30-32 FINNEY
  {t:'intro', emoji:'🏃', name:'Hal Finney', years:'1956 — 2014', role:'Amerikai kriptográfus, PGP fejlesztő, Bitcoin úttörő',
    img:'https://upload.wikimedia.org/wikipedia/en/0/09/Hal_Finney_%28computer_scientist%29.jpg',
    text:'Hal Finney a Bitcoin-történelem legfontosabb szereplője Satoshi mellett. Ő a PGP 2.0 kód egyik fejlesztője, az RPOW rendszer megalkotója, az első Bitcoin-tranzakció fogadója, és az egész cypherpunk mozgalom egyik legoptimistább gondolkodója. 2014-ben ALS-ben hunyt el.'},
  {t:'bio', emoji:'🏃', name:'Hal Finney', sub:'PGP, RPOW és az első Bitcoin tranzakció', paras:[
    'Hal Finney a Caltech-en szerzett mérnöki végzettséget, és a PGP Corporation programozójaként részt vett a PGP 2.0 kódbázis fejlesztésében — a Pretty Good Privacy az első széleskörűen használt erős titkosítási szoftver volt, amelyet Phil Zimmermann publikált 1991-ben.',
    'Az RPOW (Reusable Proof of Work, 2004) Finney Hashcash-re épülő kísérlete: egy olyan rendszer, amelyben a proof-of-work tokenek továbbadhatok és újra felhasználhatók, mint egy digitális pénz. Ez volt az utolsó kísérlet a Bitcoin előtt, amely valóban hasznosítható digitális készpénzt próbált implementálni.',
    'Finney 2009 januárjában azonnal telepítette a Bitcoin-kliensét. 2009. január 12-én Satoshi 10 bitcoint küldött Finney-nek — ez volt az első ember-ember közötti Bitcoin-tranzakció a történelemben. Finney ezen a napon azt tweetelte: "Running bitcoin."',
    'Finneynak 2009-ben ALS-t diagnosztizáltak. Fokozatosan elvesztette mozgásképességét, de elméje és humora mindvégig megmaradt — az utolsó éveit is programozással töltötte. 2014 augusztusában hunyt el. Végrendelete szerint testét krionikusan tartósítják az Alcor Life Extension Foundation gondozásában.']},
  {t:'btc', emoji:'🏃', name:'Finney és a Bitcoin',
    quote:'"Running bitcoin."',
    qa:'Hal Finney, 2009. január 11. — a kriptotörténelem legismertebb tweetje',
    tl:[{y:'2004',l:'RPOW'},{y:'2009.01.03',l:'Genesis block'},{y:'2009.01.12',l:'Első tranzakció'},{y:'2014',l:'Krionikus tartósítás'}],
    box:'Hal Finney nem csupán az első Bitcoin-felhasználó volt — ő volt Satoshi legfontosabb korai kollaborátora. Az RPOW közvetlen inspirációt adott a Bitcoin tranzakciós modelljéhez. Finney az első hibákat is ő jelezte Satoshinak, és a nyílt levelezésük a Bitcoin fejlesztéstörténetének legfontosabb forrása.',
    tags:['Első tranzakció 2009.01.12','"Running bitcoin"','RPOW 2004','Örök optimista']},

  // 34-36 SATOSHI
  {t:'intro', emoji:'₿', name:'Satoshi Nakamoto', years:'2008 — 2011 (aktív)', role:'A Bitcoin ismeretlen feltalálója/felfedezője',
    img:null,
    text:'Satoshi Nakamoto 2008. október 31-én publikálta a Bitcoin white paperjét. 2009. január 3-án lefuttatta a Genesis blokkot — amelybe a Times aznapi főcímét kódolta. 2011-ben eltűnt. Kb. 1 millió bitcoinja soha nem mozdult.'},
  {t:'bio', emoji:'₿', name:'Satoshi Nakamoto', sub:'A white paper, a Genesis blokk és az eltűnés', paras:[
    'A Bitcoin: Peer-to-Peer Electronic Cash System c. white paper 2008. október 31-én jelent meg — Halloween napján, a 2008-as pénzügyi összeomlás csúcsán. A 9 oldalas dokumentum megoldotta a digitális pénz két legsúlyosabb problémáját: a double-spend problémát és a bizalomkérdést — megbízható harmadik fél nélkül.',
    'A Genesis blokk 2009. január 3-án készült el. A blokkba kódolt szöveg: "The Times 03/Jan/2009 Chancellor on brink of second bailout for banks" — a brit pénzügyminiszter bankmentő csomagjáról szóló Times-cikk főcíme. Satoshi üzenetet küldött a Bitcoinba a banki válság és az állami beavatkozás ellen.',
    'Satoshi 2009 és 2011 között aktívan részt vett a Bitcoin fejlesztésében. A kommunikációja mindig óvatos volt a kilétét illetően — semmilyen személyes adatot nem osztott meg soha. 2011 áprilisában egy utolsó e-mailt küldött Gavin Andresennek ("átadva a terepet"), majd eltűnt.',
    'Kb. 1,1 millió bitcoin van azokon a korai tárcákon, amelyek Satoshinak tulajdoníthatók. Ezek soha nem mozdultak — sem 2013-ban, sem 2017-ben, sem a 100.000 dolláros ár körül. Ez a passzivitás az egyik legerősebb érv amellett, hogy Satoshi vagy halott, vagy tudatosan hallgat.']},
  {t:'btc', emoji:'₿', name:'Satoshi szintézise',
    quote:'"The Times 03/Jan/2009 Chancellor on brink of second bailout for banks."',
    qa:'Satoshi Nakamoto, a Genesis blokk üzenete — 2009. január 3.',
    tl:[{y:'2008.10.31',l:'White paper'},{y:'2009.01.03',l:'Genesis blokk'},{y:'2011.04',l:'Eltűnés'},{y:'∞',l:'~1M BTC érintetlen'}],
    box:'A Bitcoin nem Satoshi "találmánya" — hanem a felfedezése annak, hogy az összes előző darab összerakható. Hayek pénzelmélete, Mises sound money-ja, Chaum vak aláírása, Back Hashcash-e, Dai b-money-ja, Szabo Bit Gold-ja, Finney RPOW-ja — mind ott volt. A blokklánc az a hiányzó láncszem volt, amelyet Satoshi rakott össze. Aztán kiengedte a kezéből.',
    tags:['White paper 2008','Genesis blokk','Blokklánc mint szintézis','Anonim felfedező']},
  // 37 CLOSING
  {t:'closing'}
];

const container = document.getElementById('slides-container');
const TOTAL = SLIDES.length;
let current = 0;
let autoPlay = false;
let autoTimer = null;

function buildSlide(s, idx) {
  const el = document.createElement('div');
  el.className = 'slide';
  el.dataset.idx = idx;

  if (s.t === 'hero') {
    el.classList.add('hero-slide');
    el.innerHTML = `
      <div class="hero-tag">Prezentáció &middot; 2025</div>
      <h1>A Bitcoin nem feltalálmány&thinsp;&mdash;&thinsp;hanem felfedezés</h1>
      <p class="hero-sub">Tizenegy látnok, kriptográfus és közgazdász, akik évtizedekkel megelőzték a Bitcoint — és akik nélkül Satoshi sohasem írhatta volna meg a white paperjét.</p>
      <div class="hero-quote">"Ha láttam messzebbre, az azért van, mert óriások vállain álltam." &mdash; Isaac Newton</div>
      <div class="hero-badge"><span>38 dia</span> &middot; Nyomj &rarr; vagy kattints a folytatáshoz</div>`;

  } else if (s.t === 'div') {
    el.classList.add('divider-slide');
    el.innerHTML = `<div class="divider-inner">
      <div class="divider-num">${s.num}</div>
      <h2>${s.title}</h2>
      <div class="divider-line"></div>
      <p>${s.sub}</p>
    </div>`;

  } else if (s.t === 'intro') {
    el.classList.add('person-intro');
    const imgContent = s.img
      ? `<img src="${s.img}" alt="${s.name}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=\\"font-size:56px\\">${s.emoji}</span>'">`
      : `<span style="font-size:56px">${s.emoji}</span>`;
    el.innerHTML = `
      <div class="portrait-ring">${imgContent}</div>
      <div class="intro-content">
        <div class="person-years">${s.years}</div>
        <h2>${s.name}</h2>
        <div class="person-role">${s.role}</div>
        <p class="intro-text">${s.text}</p>
      </div>`;

  } else if (s.t === 'bio') {
    el.classList.add('person-bio');
    el.innerHTML = `<div class="bio-inner">
      <div class="bio-header">
        <div class="bio-icon">${s.emoji}</div>
        <div><h3>${s.name}</h3><div class="bio-sub-label">${s.sub}</div></div>
      </div>
      <div class="bio-body">${s.paras.map(p=>`<p>${p}</p>`).join('')}</div>
    </div>`;

  } else if (s.t === 'btc') {
    el.classList.add('btc-slide');
    const tlHtml = s.tl.map((item, i, arr) => `
      <div class="tl-item">
        <div class="tl-year">${item.y}</div>
        <div class="tl-dot"></div>
        <div class="tl-label">${item.l}</div>
      </div>${i < arr.length-1 ? '<div class="tl-line"></div>' : ''}`).join('');
    el.innerHTML = `<div class="btc-inner">
      <span class="btc-symbol">&#8383;</span>
      <div class="btc-slide-title">Kapcsolódás a Bitcoinhoz &middot; ${s.name}</div>
      <div class="btc-quote">
        <div class="quote-text">${s.quote}</div>
        <div class="quote-attr">${s.qa}</div>
      </div>
      <div class="btc-timeline">${tlHtml}</div>
      <div class="btc-box">
        <div class="btc-box-title">Miért számít?</div>
        <p>${s.box}</p>
      </div>
      <div class="btc-tags">${s.tags.map(t=>`<span class="btc-tag">${t}</span>`).join('')}</div>
    </div>`;

  } else if (s.t === 'closing') {
    el.classList.add('closing-slide');
    el.innerHTML = `
      <div class="closing-quote">"Az igazságot nem feltalálják.<br>Az igazságot felfedezik."</div>
      <div class="grid-boxes">
        <div class="grid-box"><div class="gb-icon">&#129504;</div><div class="gb-title">Az ötletek örökké élnek</div><div class="gb-text">Tesla, Ford, Hayek, Mises és Friedman gondolatai nem haltak meg velük — a Bitcoinban élnek tovább.</div></div>
        <div class="grid-box"><div class="gb-icon">&#128272;</div><div class="gb-title">A kód a katalizátor</div><div class="gb-text">Chaum, Wei Dai, Szabo, Back és Finney a kriptográfia eszközeit kovácsolta meg — Satoshi összerakta őket.</div></div>
        <div class="grid-box"><div class="gb-icon">&#8383;</div><div class="gb-title">A hiányzó láncszem</div><div class="gb-text">A blokklánc nem ötlet volt, hanem felfedezés — annak rájövése, hogy a darabok összerakhatók.</div></div>
        <div class="grid-box"><div class="gb-icon">&#8734;</div><div class="gb-title">21 millió határ</div><div class="gb-text">A véges kínálat nem önkényes döntés — az emberi civilizáció monetáris tanulságainak szintézise.</div></div>
      </div>`;
  }

  container.appendChild(el);
  return el;
}

const slideEls = SLIDES.map(buildSlide);

function goTo(n) {
  if (n < 0 || n >= TOTAL || n === current) return;
  slideEls[current].classList.remove('active');
  slideEls[current].classList.add('exit-left');
  const prev = current;
  setTimeout(() => slideEls[prev].classList.remove('exit-left'), 800);
  current = n;
  slideEls[current].classList.add('active');
  const bio = slideEls[current].querySelector('.bio-body');
  if (bio) bio.scrollTop = 0;
  updateUI();
}

function updateUI() {
  document.getElementById('counter').textContent = `${current + 1} / ${TOTAL}`;
  document.getElementById('progress-bar').style.width = (TOTAL > 1 ? current / (TOTAL-1) * 100 : 100) + '%';
}

function startAuto() {
  autoPlay = true;
  document.getElementById('btn-play').classList.add('active-play');
  document.getElementById('btn-play').innerHTML = '&#9646;&#9646;';
  autoTimer = setInterval(() => { current < TOTAL-1 ? goTo(current+1) : stopAuto(); }, 6000);
}
function stopAuto() {
  autoPlay = false;
  clearInterval(autoTimer);
  document.getElementById('btn-play').classList.remove('active-play');
  document.getElementById('btn-play').innerHTML = '&#9654;';
}

document.getElementById('btn-prev').onclick = () => { stopAuto(); goTo(current-1); };
document.getElementById('btn-next').onclick = () => { stopAuto(); goTo(current+1); };
document.getElementById('btn-play').onclick = () => autoPlay ? stopAuto() : startAuto();

document.addEventListener('keydown', e => {
  if (['ArrowRight','ArrowDown'].includes(e.key)) { stopAuto(); goTo(current+1); }
  if (['ArrowLeft','ArrowUp'].includes(e.key)) { stopAuto(); goTo(current-1); }
  if (e.key === ' ') { e.preventDefault(); autoPlay ? stopAuto() : startAuto(); }
});

let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) { stopAuto(); goTo(current + (dx < 0 ? 1 : -1)); }
}, {passive:true});

goTo(0);
</script>
</body>
</html>
