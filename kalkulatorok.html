<!DOCTYPE html>
<html lang="hu">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Kalkulátorok — Hamarosan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #07070a; color: #e8e8ec;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;

        .container { text-align: center; max-width: 500px; padding: 2rem; }
        .btc-icon { font-size: 3rem; margin-bottom: 1.5rem; opacity: 0.6; }

        p { font-size: 0.88rem; color: #7a7a88; line-height: 1.8; margin-bottom: 2rem; }
        .back {
            display: inline-block; padding: 0.55rem 1.2rem;
            border: 1px solid #1a1a22; border-radius: 8px;
            color: #7a7a88; text-decoration: none; font-size: 0.78rem;
            letter-spacing: 0.04em; transition: all 0.25s;

        .back:hover { border-color: #444; color: #fff; background: rgba(255,255,255,0.03); }

</head>
<body>
    <div class="container">
        <div class="btc-icon">₿</div>
