<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovács Ferenc — Átirányítás</title>
    <script>
        // Fallback redirect ha a Netlify _redirects nem működne
        var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
        if (lang.startsWith('hu')) {
            window.location.replace('/hu/');
        } else {
            window.location.replace('/en/');
        }
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0;url=/en/">
    </noscript>
</head>
<body>
    <p>Átirányítás... / Redirecting...</p>
    <p><a href="/hu/">Magyar</a> | <a href="/en/">English</a></p>
</body>
</html>
